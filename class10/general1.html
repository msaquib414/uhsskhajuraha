
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सामान्य ज्ञान क्विज़ (General Awareness) - Set 2</title>
    <style>
        :root {
            --primary: #8b5cf6; /* Violet */
            --secondary: #5b21b6; /* Dark Violet */
            --bg: #f5f3ff; /* Very Light Violet */
            --text: #1e293b;
            --white: #ffffff;
            --correct: #dcfce7;
            --correct-border: #16a34a;
            --wrong: #fee2e2;
            --wrong-border: #dc2626;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            /* Disable text selection for security */
            user-select: none; 
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        /* Fixed Timer Bar */
        .timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .container {
            max-width: 800px;
            margin: 90px auto 40px;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.15);
        }

        /* Login Screen */
        #login-screen {
            text-align: center;
            padding: 50px 20px;
        }

        h1 { color: var(--primary); margin-bottom: 10px; font-size: 2.2rem;}
        .subtitle { color: #475569; margin-bottom: 30px; font-size: 1.1rem; font-weight: 500;}

        input[type="text"] {
            padding: 14px 20px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: background-color 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(139, 92, 246, 0.3);
        }
        .btn:hover { background-color: var(--secondary); }

        /* Quiz Section */
        #quiz-section { display: none; }

        .question-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-left: 5px solid var(--primary);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .q-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #1e293b;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
            font-size: 1.05rem;
        }

        label:hover { background-color: #f1f5f9; border-color: #cbd5e1; }

        input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            accent-color: var(--primary);
        }

        /* Results */
        #result-section {
            display: none;
            text-align: center;
        }

        .score-box {
            background: var(--primary);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px rgba(139, 92, 246, 0.2);
        }
        .score-val { font-size: 4rem; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            text-align: left;
            font-size: 1.05rem;
        }
        .feedback.correct { background: var(--correct); color: #166534; border: 1px solid var(--correct-border); }
        .feedback.wrong { background: var(--wrong); color: #991b1b; border: 1px solid var(--wrong-border); }

        .user-wrong { background-color: var(--wrong) !important; border-color: var(--wrong-border) !important; }
        .actual-correct { background-color: var(--correct) !important; border-color: var(--correct-border) !important; font-weight: bold; }

    </style>
</head>

<script>
    // --- Data: 40 MCQs (General Awareness Set 2) ---

    const quizData = [
        // Set A (Correct Answer: A) - 10 Questions
        { q: "भारतीय रिज़र्व बैंक (RBI) का राष्ट्रीयकरण किस वर्ष हुआ था?", a: "A", opts: { A: "1949", B: "1935", C: "1950", D: "1952" } },

        { q: "विटामिन A का रासायनिक नाम क्या है?", a: "A", opts: { A: "रेटिनॉल", B: "थायमिन", C: "एस्कॉर्बिक एसिड", D: "कैल्सीफेरॉल" } },
        { q: "अंतर्राष्ट्रीय योग दिवस (International Yoga Day) कब मनाया जाता है?", a: "A", opts: { A: "21 जून", B: "21 जुलाई", C: "21 मई", D: "21 अगस्त" } },
        { q: "मानव शरीर की सबसे बड़ी ग्रंथि (Gland) कौन सी है?", a: "A", opts: { A: "यकृत (Liver)", B: "अग्न्याशय (Pancreas)", C: "पीयूष (Pituitary)", D: "थायरॉयड" } },
        { q: "भारत के किस राज्य में 'काजीरंगा राष्ट्रीय उद्यान' स्थित है?", a: "A", opts: { A: "असम", B: "पश्चिम बंगाल", C: "मध्य प्रदेश", D: "उत्तराखंड" } },
        { q: "कंप्यूटर में 'RAM' का पूर्ण रूप क्या है?", a: "A", opts: { A: "Random Access Memory", B: "Read Access Memory", C: "Read And Memorize", D: "Random Active Memory" } },
        { q: "नीति आयोग (NITI Aayog) के पदेन अध्यक्ष कौन होते हैं?", a: "A", opts: { A: "प्रधानमंत्री", B: "वित्त मंत्री", C: "राष्ट्रपति", D: "गृह मंत्री" } },

        // Set B (Correct Answer: B) - 10 Questions
        { q: "'डिस्कवरी ऑफ इंडिया' (भारत की खोज) पुस्तक के लेखक कौन हैं?", a: "B", opts: { A: "महात्मा गांधी", B: "जवाहरलाल नेहरू", C: "सुभाष चंद्र बोस", D: "सरदार पटेल" } },
        { q: "भारत में पहली रेलगाड़ी किस वर्ष चली थी?", a: "B", opts: { A: "1850", B: "1853", C: "1857", D: "1901" } },
        { q: "प्रकाश संश्लेषण (Photosynthesis) के दौरान पौधे कौन सी गैस ग्रहण करते हैं?", a: "B", opts: { A: "ऑक्सीजन", B: "कार्बन डाइऑक्साइड", C: "नाइट्रोजन", D: "हीलियम" } },
        { q: "हमारे सौरमंडल का सबसे चमकीला ग्रह कौन सा है?", a: "B", opts: { A: "बुध", B: "शुक्र", C: "मंगल", D: "बृहस्पति" } },
        { q: "भारत का सर्वोच्च सैन्य वीरता पुरस्कार कौन सा है?", a: "B", opts: { A: "भारत रत्न", B: "परमवीर चक्र", C: "अशोक चक्र", D: "शौर्य चक्र" } },
        { q: "किस नदी को 'दक्षिण गंगा' (Dakshin Ganga) के नाम से जाना जाता है?", a: "B", opts: { A: "कृष्णा", B: "गोदावरी", C: "कावेरी", D: "नर्मदा" } },
        { q: "'विश्व स्वास्थ्य संगठन' (WHO) का मुख्यालय कहाँ स्थित है?", a: "B", opts: { A: "वाशिंगटन डीसी", B: "जिनेवा", C: "पेरिस", D: "न्यूयॉर्क" } },
        { q: "भारतीय संविधान में वर्तमान में कितने मौलिक अधिकार (Fundamental Rights) हैं?", a: "B", opts: { A: "5", B: "6", C: "7", D: "8" } },
        { q: "वायुमंडलीय दाब (Atmospheric Pressure) मापने वाले यंत्र को क्या कहते हैं?", a: "B", opts: { A: "थर्मामीटर", B: "बैरोमीटर", C: "हाइड्रोमीटर", D: "लैक्टोमीटर" } },
        { q: "'मैकमोहन रेखा' किन दो देशों के बीच की अंतर्राष्ट्रीय सीमा है?", a: "B", opts: { A: "भारत और पाकिस्तान", B: "भारत और चीन", C: "भारत और नेपाल", D: "भारत और बांग्लादेश" } },

        // Set C (Correct Answer: C) - 10 Questions
        { q: "प्रसिद्ध खजुराहो के मंदिर किस राज्य में स्थित हैं?", a: "C", opts: { A: "उत्तर प्रदेश", B: "राजस्थान", C: "मध्य प्रदेश", D: "महाराष्ट्र" } },
        { q: "विद्युत धारा (Electric Current) की SI इकाई क्या है?", a: "C", opts: { A: "वोल्ट", B: "ओम", C: "एम्पीयर", D: "वाट" } },
        { q: "स्वतंत्र भारत के प्रथम और अंतिम भारतीय गवर्नर जनरल कौन थे?", a: "C", opts: { A: "लॉर्ड माउंटबेटन", B: "राजेंद्र प्रसाद", C: "सी. राजगोपालाचारी", D: "जवाहरलाल नेहरू" } },
        { q: "मानव रक्त (Human Blood) का pH मान लगभग कितना होता है?", a: "C", opts: { A: "6.4", B: "7.0", C: "7.4", D: "8.0" } },
        { q: "'भांगड़ा' किस राज्य का प्रसिद्ध लोक नृत्य है?", a: "C", opts: { A: "हरियाणा", B: "गुजरात", C: "पंजाब", D: "राजस्थान" } },
        { q: "विश्व का सबसे बड़ा मरुस्थल (Desert) कौन सा है?", a: "C", opts: { A: "गोबी", B: "थार", C: "सहारा", D: "अटाकामा" } },
        { q: "सौरमंडल में किस ग्रह को 'लाल ग्रह' (Red Planet) कहा जाता है?", a: "C", opts: { A: "शनि", B: "शुक्र", C: "मंगल", D: "अरुण" } },
        { q: "अर्जुन पुरस्कार किस क्षेत्र में उत्कृष्ट प्रदर्शन के लिए दिया जाता है?", a: "C", opts: { A: "सिनेमा", B: "साहित्य", C: "खेलकूद (Sports)", D: "विज्ञान" } },
        { q: "भारत के राष्ट्रीय गीत 'वंदे मातरम' के रचयिता कौन हैं?", a: "C", opts: { A: "रवींद्रनाथ टैगोर", B: "महात्मा गांधी", C: "बंकिम चंद्र चटर्जी", D: "सुभाष चंद्र बोस" } },
        { q: "भारत का राष्ट्रीय वृक्ष कौन सा है?", a: "C", opts: { A: "नीम", B: "पीपल", C: "बरगद (Banyan)", D: "आम" } },

        // Set D (Correct Answer: D) - 10 Questions
        { q: "नोबेल पुरस्कार देने की शुरुआत किस वर्ष से हुई थी?", a: "D", opts: { A: "1895", B: "1905", C: "1910", D: "1901" } },
        { q: "पृथ्वी के वायुमंडल में नाइट्रोजन गैस की मात्रा लगभग कितनी प्रतिशत है?", a: "D", opts: { A: "21%", B: "0.03%", C: "50%", D: "78%" } },
        { q: "'आर्य समाज' की स्थापना किसने की थी?", a: "D", opts: { A: "राजा राममोहन राय", B: "स्वामी विवेकानंद", C: "रामकृष्ण परमहंस", D: "स्वामी दयानंद सरस्वती" } },
        { q: "भारत में 'स्वच्छ भारत अभियान' की शुरुआत कब की गई?", a: "D", opts: { A: "2012", B: "2015", C: "2016", D: "2014" } },
        { q: "पृथ्वी पर पाया जाने वाला सबसे कठोर प्राकृतिक पदार्थ कौन सा है?", a: "D", opts: { A: "लोहा", B: "सोना", C: "प्लैटिनम", D: "हीरा (Diamond)" } },
        { q: "प्राचीन भारतीय ग्रन्थ 'नाट्य शास्त्र' के रचयिता कौन माने जाते हैं?", a: "D", opts: { A: "कालिदास", B: "वेदव्यास", C: "वाल्मीकि", D: "भरत मुनि" } },
        { q: "संयुक्त राष्ट्र संघ (UNO) की स्थापना कब हुई थी?", a: "D", opts: { A: "1919", B: "1939", C: "1950", D: "1945" } },
        { q: "मनुष्य की आँखों में किसी वस्तु का प्रतिबिंब (Image) कहाँ बनता है?", a: "D", opts: { A: "कॉर्निया", B: "पुतली", C: "परितारिका (Iris)", D: "रेटिना" } },
        { q: "भारत के किस शहर को भारत की 'सिलिकॉन वैली' कहा जाता है?", a: "D", opts: { A: "हैदराबाद", B: "पुणे", C: "चेन्नई", D: "बेंगलुरु" } },
        { q: "प्रसिद्ध स्मारक 'गेटवे ऑफ इंडिया' (Gateway of India) कहाँ स्थित है?", a: "D", opts: { A: "नई दिल्ली", B: "कोलकाता", C: "चेन्नई", D: "मुंबई" } }
    ];

    // Function to shuffle questions
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let shuffledQuestions = [];
    let timeLeft = 30 * 60; // 30 Minutes
    let timerInterval;

    // Start Quiz
    function startQuiz() {
        const nameInput = document.getElementById('candidateName');
        if (!nameInput.value.trim()) {
            alert("क्विज़ शुरू करने से पहले कृपया अपना नाम दर्ज करें।");
            return;
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        
        shuffledQuestions = shuffle([...quizData]);
        renderQuestions();
        startTimer();
    }

    // Render Form
    function renderQuestions() {
        const form = document.getElementById('quiz-form');
        form.innerHTML = '';

        shuffledQuestions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'q-text';
            qTitle.innerText = `प्र. ${index + 1}: ${q.q}`;
            card.appendChild(qTitle);

            const optsDiv = document.createElement('div');
            optsDiv.className = 'options';

            for (const [key, value] of Object.entries(q.opts)) {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${index}`;
                radio.value = key;
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(` ${value}`)); 
                optsDiv.appendChild(label);
            }
            card.appendChild(optsDiv);

            const feedback = document.createElement('div');
            feedback.id = `feedback-${index}`;
            feedback.className = 'feedback';
            card.appendChild(feedback);

            form.appendChild(card);
        });
    }

    // Timer Logic
    function startTimer() {
        const timerDisplay = document.getElementById('timer');
        timerInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            timerDisplay.innerText = `${minutes}:${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitQuiz();
            }
            timeLeft--;
        }, 1000);
    }

    // Submit and Evaluate
    function submitQuiz() {
        clearInterval(timerInterval);
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = "परीक्षा समाप्त (Test Submitted)";
        document.getElementById('submitBtn').style.opacity = "0.5";

        let score = 0;
        let candidateName = document.getElementById('candidateName').value;
        const total = shuffledQuestions.length;

        shuffledQuestions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback-${index}`);
            const card = feedbackDiv.parentElement;
            const options = card.querySelectorAll('label');

            let userAnswer = selected ? selected.value : null;

            const inputs = card.querySelectorAll('input');
            inputs.forEach(inp => inp.disabled = true);

            if (userAnswer === q.a) {
                score++;
                feedbackDiv.innerHTML = `✅ बिल्कुल सही उत्तर!`;
                feedbackDiv.className = 'feedback correct';
                if(selected) selected.parentElement.classList.add('actual-correct');
            } else {
                feedbackDiv.innerHTML = `❌ गलत उत्तर। सही विकल्प: <b>${q.opts[q.a]}</b>`;
                feedbackDiv.className = 'feedback wrong';
                
                if (selected) selected.parentElement.classList.add('user-wrong');
                
                options.forEach(lbl => {
                    if (lbl.querySelector('input').value === q.a) {
                        lbl.classList.add('actual-correct');
                    }
                });
            }
            feedbackDiv.style.display = 'block';
        });

        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('result-section').style.display = 'block';
        
        const container = document.querySelector('.container');
        const resSec = document.getElementById('result-section');
        const loginSec = document.getElementById('login-screen');
        container.insertBefore(resSec, loginSec.nextSibling);

        document.getElementById('final-score').innerText = `${score} / ${total}`;
        document.getElementById('candidate-display').innerText = `परीक्षार्थी: ${candidateName}`;

        window.scrollTo({ top: 0, behavior: 'smooth' });

        downloadCSV(candidateName, score, total);
    }

    // Generate CSV
    function downloadCSV(name, score, total) {
        const date = new Date().toLocaleString('en-IN');
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
            + "Candidate Name,Score,Total Questions,Date/Time\n"
            + `"${name}",${score},${total},"${date}"`;

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `GK_Set2_Result_${name.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Security Features
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
    }
</script>
