<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भारतीय सेना का इतिहास (Indian Army History Quiz)</title>
    <style>
        :root {
            --primary: #4d7c0f; /* Olive Green / Army Green */
            --secondary: #3f6212; /* Dark Olive */
            --accent: #ca8a04; /* Gold/Brass */
            --bg: #f7fee7; /* Very Light Green */
            --text: #172554; 
            --white: #ffffff;
            --correct: #dcfce7;
            --correct-border: #16a34a;
            --wrong: #fee2e2;
            --wrong-border: #dc2626;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            /* Disable text selection for security */
            user-select: none; 
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        /* Fixed Timer Bar */
        .timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #14532d;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 3px solid var(--accent);
        }

        .container {
            max-width: 850px;
            margin: 90px auto 40px;
            background: var(--white);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(77, 124, 15, 0.2);
            border-top: 5px solid var(--primary);
        }

        /* Login Screen */
        #login-screen {
            text-align: center;
            padding: 50px 20px;
        }

        h1 { color: var(--primary); margin-bottom: 10px; font-size: 2.2rem; text-transform: uppercase;}
        .subtitle { color: #4b5563; margin-bottom: 30px; font-size: 1.15rem; font-weight: 500;}

        input[type="text"] {
            padding: 14px 20px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.15rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: background-color 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(77, 124, 15, 0.3);
            text-transform: uppercase;
        }
        .btn:hover { background-color: var(--secondary); }

        /* Quiz Section */
        #quiz-section { display: none; }

        .question-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-left: 5px solid var(--accent);
            border-radius: 8px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .q-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 18px;
            color: #1e293b;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
            font-size: 1.05rem;
        }

        label:hover { background-color: #f1f5f9; border-color: #94a3b8; }

        input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            accent-color: var(--primary);
        }

        /* Results */
        #result-section {
            display: none;
            text-align: center;
        }

        .score-box {
            background: #14532d;
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px rgba(20, 83, 45, 0.3);
            border: 2px solid var(--accent);
        }
        .score-val { font-size: 4rem; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); color: #fef08a; }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            text-align: left;
            font-size: 1.05rem;
        }
        .feedback.correct { background: var(--correct); color: #166534; border: 1px solid var(--correct-border); }
        .feedback.wrong { background: var(--wrong); color: #991b1b; border: 1px solid var(--wrong-border); }

        .user-wrong { background-color: var(--wrong) !important; border-color: var(--wrong-border) !important; }
        .actual-correct { background-color: var(--correct) !important; border-color: var(--correct-border) !important; font-weight: bold; }

    </style>
</head>
<body oncontextmenu="return false;"> <div class="timer-bar">
        समय शेष: <span id="timer" style="margin-left: 15px; color: #fef08a;">30:00</span>
    </div>

    <div class="container">
        
        <div id="login-screen">
            <h1>भारतीय सेना का इतिहास</h1>
            <p class="subtitle">वीरता, शौर्य और बलिदान (40 प्रश्न)</p>
            <input type="text" id="candidateName" placeholder="अपना पूरा नाम दर्ज करें" autocomplete="off">
            <br>
            <button class="btn" onclick="startQuiz()">क्विज़ शुरू करें (Start Quiz)</button>
        </div>

        <div id="quiz-section">
            <form id="quiz-form">
                </form>
            <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
                <button type="button" class="btn" id="submitBtn" onclick="submitQuiz()">उत्तर जमा करें (Submit Test)</button>
            </div>
        </div>

        <div id="result-section">
            <div class="score-box">
                <h2>आपका परिणाम (Result)</h2>
                <div class="score-val" id="final-score">0 / 40</div>
                <p id="candidate-display" style="font-size: 1.3rem; margin-top: 15px; opacity: 0.9;"></p>
                <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">विस्तृत विश्लेषण के लिए Result.csv डाउनलोड हो रहा है...</p>
            </div>
        </div>

    </div>

<script>
    // --- Data: 40 MCQs (Indian Army History) ---
    // Distribution: Exactly 10 A, 10 B, 10 C, 10 D.
    const quizData = [
        // Set A (Correct Answer: A) - 10 Questions
        { q: "भारत में 'सेना दिवस' (Army Day) किस दिन मनाया जाता है?", a: "A", opts: { A: "15 जनवरी", B: "26 जनवरी", C: "15 अगस्त", D: "8 अक्टूबर" } },
        { q: "स्वतंत्र भारत के पहले भारतीय कमांडर-इन-चीफ कौन थे?", a: "A", opts: { A: "फील्ड मार्शल के. एम. करियप्पा", B: "जनरल सैम मानेकशॉ", C: "जनरल के. एस. थिमय्या", D: "जनरल बिपिन रावत" } },
        { q: "भारतीय सेना का आदर्श वाक्य (Motto) क्या है?", a: "A", opts: { A: "सेवा परमो धर्म: (Service Before Self)", B: "नभः स्पृशं दीप्तम्", C: "शं नो वरुणः", D: "वीर भोग्या वसुंधरा" } },
        { q: "भारतीय सेना का मुख्यालय कहाँ स्थित है?", a: "A", opts: { A: "नई दिल्ली", B: "पुणे", C: "देहरादून", D: "शिमला" } },
        { q: "भारत का सर्वोच्च सैन्य वीरता पुरस्कार कौन सा है?", a: "A", opts: { A: "परमवीर चक्र", B: "महावीर चक्र", C: "अशोक चक्र", D: "शौर्य चक्र" } },
        { q: "1971 के भारत-पाकिस्तान युद्ध का मुख्य परिणाम क्या था?", a: "A", opts: { A: "बांग्लादेश का निर्माण", B: "एलओसी का निर्धारण", C: "शिमला समझौता रद्द होना", D: "कारगिल पर कब्ज़ा" } },
        { q: "'ऑपरेशन विजय' (Operation Vijay) का संबंध किस युद्ध से है?", a: "A", opts: { A: "कारगिल युद्ध (1999)", B: "भारत-चीन युद्ध (1962)", C: "भारत-पाक युद्ध (1965)", D: "ऑपरेशन ब्लू स्टार" } },
        { q: "इंडियन मिलिट्री एकेडमी (IMA) कहाँ स्थित है?", a: "A", opts: { A: "देहरादून", B: "खड़कवासला", C: "गया", D: "चेन्नई" } },
        { q: "1857 के प्रथम स्वतंत्रता संग्राम में मंगल पांडे किस रेजीमेंट के सिपाही थे?", a: "A", opts: { A: "34वीं बंगाल नेटिव इन्फैंट्री", B: "राजपूत रेजीमेंट", C: "मद्रास रेजीमेंट", D: "गोरखा राइफल्स" } },
        { q: "भारतीय सेना की सबसे छोटी सामरिक इकाई (Tactical Unit) कौन सी है?", a: "A", opts: { A: "सेक्शन (Section)", B: "प्लाटून", C: "कंपनी", D: "बटालियन" } },

        // Set B (Correct Answer: B) - 10 Questions
        { q: "भारत का पहला 'फील्ड मार्शल' (Field Marshal) बनने का गौरव किसे प्राप्त है?", a: "B", opts: { A: "के. एम. करियप्पा", B: "सैम मानेकशॉ", C: "अर्जन सिंह", D: "सुब्रतो मुखर्जी" } },
        { q: "भारत की सबसे पुरानी पैरामिलिट्री फोर्स कौन सी है?", a: "B", opts: { A: "सीआरपीएफ (CRPF)", B: "असम राइफल्स", C: "बीएसएफ (BSF)", D: "आईटीबीपी (ITBP)" } },
        { q: "भारतीय सशस्त्र बलों का 'सुप्रीम कमांडर' कौन होता है?", a: "B", opts: { A: "प्रधानमंत्री", B: "राष्ट्रपति", C: "रक्षा मंत्री", D: "चीफ ऑफ डिफेंस स्टाफ (CDS)" } },
        { q: "सियाचिन ग्लेशियर पर नियंत्रण के लिए भारतीय सेना ने 1984 में कौन सा ऑपरेशन चलाया था?", a: "B", opts: { A: "ऑपरेशन पराक्रम", B: "ऑपरेशन मेघदूत", C: "ऑपरेशन ट्राइडेंट", D: "ऑपरेशन पवन" } },
        { q: "'कारगिल विजय दिवस' (Kargil Vijay Diwas) हर साल कब मनाया जाता है?", a: "B", opts: { A: "15 अगस्त", B: "26 जुलाई", C: "16 दिसंबर", D: "2 अक्टूबर" } },
        { q: "परमवीर चक्र से सम्मानित होने वाले पहले भारतीय सैनिक कौन थे?", a: "B", opts: { A: "कैप्टन विक्रम बत्रा", B: "मेजर सोमनाथ शर्मा", C: "अब्दुल हमीद", D: "अल्बर्ट एक्का" } },
        { q: "आर्मी एविएशन कॉर्प्स (Army Aviation Corps) की स्थापना किस वर्ष हुई थी?", a: "B", opts: { A: "1947", B: "1986", C: "1999", D: "1962" } },
        { q: "1965 का भारत-पाकिस्तान युद्ध किस समझौते के साथ समाप्त हुआ था?", a: "B", opts: { A: "शिमला समझौता", B: "ताशकंद समझौता", C: "लाहौर घोषणा", D: "आगरा समझौता" } },
        { q: "स्वतंत्र भारत में रक्षा अनुसंधान एवं विकास संगठन (DRDO) की स्थापना कब हुई?", a: "B", opts: { A: "1948", B: "1958", C: "1969", D: "1998" } },
        { q: "राष्ट्रीय युद्ध स्मारक (National War Memorial) कहाँ स्थित है?", a: "B", opts: { A: "मुंबई", B: "नई दिल्ली (इंडिया गेट के पास)", C: "कारगिल", D: "देहरादून" } },

        // Set C (Correct Answer: C) - 10 Questions
        { q: "भारतीय सेना में एक 'लेफ्टिनेंट' (Lieutenant) के बाद अगला पद (Rank) कौन सा होता है?", a: "C", opts: { A: "मेजर", B: "कर्नल", C: "कैप्टन", D: "ब्रिगेडियर" } },
        { q: "ईस्ट इंडिया कंपनी की सेनाओं का विलय करके आधिकारिक 'ब्रिटिश इंडियन आर्मी' कब बनाई गई थी?", a: "C", opts: { A: "1757", B: "1857", C: "1895", D: "1947" } },
        { q: "हैदराबाद रियासत को भारत में मिलाने के लिए 1948 में भारतीय सेना ने कौन सा ऑपरेशन किया था?", a: "C", opts: { A: "ऑपरेशन मेघदूत", B: "ऑपरेशन विजय", C: "ऑपरेशन पोलो", D: "ऑपरेशन रक्षक" } },
        { q: "कॉलेज ऑफ मिलिट्री इंजीनियरिंग (CME) कहाँ स्थित है?", a: "C", opts: { A: "बेंगलुरु", B: "देहरादून", C: "पुणे", D: "महू (Mhow)" } },
        { q: "भारतीय सेना के पहले चीफ ऑफ डिफेंस स्टाफ (CDS) कौन थे?", a: "C", opts: { A: "जनरल एम.एम. नरवणे", B: "जनरल वी.के. सिंह", C: "जनरल बिपिन रावत", D: "जनरल दलबीर सिंह सुहाग" } },
        { q: "सेना दिवस 15 जनवरी को क्यों मनाया जाता है?", a: "C", opts: { A: "इस दिन सेना की स्थापना हुई थी", B: "इस दिन भारत आज़ाद हुआ था", C: "इस दिन के. एम. करियप्पा ने पहले भारतीय कमांडर के रूप में पदभार संभाला था", D: "इस दिन 1971 का युद्ध जीता गया था" } },
        { q: "भारतीय सेना में शामिल होने वाली पहली महिला अधिकारी (First female officer) कौन थीं?", a: "C", opts: { A: "पुनीता अरोड़ा", B: "मिताली मधुमिता", C: "प्रिया झिंगन", D: "गुंजन सक्सेना" } },
        { q: "विश्व का सबसे ऊँचा युद्धक्षेत्र (Highest Battlefield) कौन सा माना जाता है?", a: "C", opts: { A: "कारगिल", B: "द्रास", C: "सियाचिन ग्लेशियर", D: "अक्साई चिन" } },
        { q: "'हाई एल्टीट्यूड वारफेयर स्कूल' (HAWS) कहाँ स्थित है?", a: "C", opts: { A: "लेह", B: "शिमला", C: "गुलमर्ग", D: "तवांग" } },
        { q: "भारतीय सेना की 'कमांड' (Commands) की कुल संख्या (प्रशिक्षण कमांड सहित) कितनी है?", a: "C", opts: { A: "5", B: "6", C: "7", D: "8" } },

        // Set D (Correct Answer: D) - 10 Questions
        { q: "कौन सी इन्फैंट्री रेजिमेंट अपने पारंपरिक हथियार 'खुकरी' (Khukri) के लिए जानी जाती है?", a: "D", opts: { A: "सिख रेजिमेंट", B: "मराठा लाइट इन्फैंट्री", C: "राजपूत रेजिमेंट", D: "गोरखा राइफल्स" } },
        { q: "1988 में मालदीव में तख्तापलट रोकने के लिए भारतीय सेना ने कौन सा ऑपरेशन चलाया था?", a: "D", opts: { A: "ऑपरेशन पवन", B: "ऑपरेशन पराक्रम", C: "ऑपरेशन सूर्य होप", D: "ऑपरेशन कैक्टस" } },
        { q: "भारतीय सेना में 'सूबेदार' (Subedar) किस प्रकार का रैंक है?", a: "D", opts: { A: "कमीशंड ऑफिसर (CO)", B: "नॉन-कमीशंड ऑफिसर (NCO)", C: "सिपाही", D: "जूनियर कमीशंड ऑफिसर (JCO)" } },
        { q: "1897 का प्रसिद्ध 'सारागढ़ी का युद्ध' (Battle of Saragarhi) किस रेजीमेंट के 21 सैनिकों ने लड़ा था?", a: "D", opts: { A: "मद्रास रेजीमेंट", B: "डोगरा रेजीमेंट", C: "पंजाब रेजीमेंट", D: "36वीं सिख रेजीमेंट" } },
        { q: "भारत-चीन युद्ध (Indo-China War) किस वर्ष हुआ था?", a: "D", opts: { A: "1947", B: "1965", C: "1971", D: "1962" } },
        { q: "भारतीय सेना ने महिलाओं को 'मिलिट्री पुलिस' (Corps of Military Police) में जवानों के रूप में कब शामिल करना शुरू किया?", a: "D", opts: { A: "1992", B: "2005", C: "2010", D: "2019-2021 के दौरान" } },
        { q: "श्रीलंका में शांति सेना (IPKF) भेजने के लिए 1987 में कौन सा ऑपरेशन चलाया गया था?", a: "D", opts: { A: "ऑपरेशन कैक्टस", B: "ऑपरेशन पोलो", C: "ऑपरेशन मेघदूत", D: "ऑपरेशन पवन" } },
        { q: "राष्ट्रीय रक्षा अकादमी (NDA) कहाँ स्थित है?", a: "D", opts: { A: "चेन्नई", B: "देहरादून", C: "ग्वालियर", D: "खड़कवासला (पुणे)" } },
        { q: "1971 के युद्ध के दौरान भारत के रक्षा मंत्री कौन थे?", a: "D", opts: { A: "इंदिरा गांधी", B: "यशवंतराव चव्हाण", C: "वी. के. कृष्ण मेनन", D: "जगजीवन राम" } },
        { q: "भारतीय सेना के झंडे (Army Flag) की पृष्ठभूमि का रंग क्या है?", a: "D", opts: { A: "गहरा नीला", B: "हल्का नीला", C: "सफ़ेद", D: "लाल (दो पार की हुई तलवारों और अशोक स्तंभ के साथ)" } }
    ];

    // Function to shuffle questions
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let shuffledQuestions = [];
    let timeLeft = 30 * 60; // 30 Minutes
    let timerInterval;

    // Start Quiz
    function startQuiz() {
        const nameInput = document.getElementById('candidateName');
        if (!nameInput.value.trim()) {
            alert("क्विज़ शुरू करने से पहले कृपया अपना नाम दर्ज करें।");
            return;
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        
        shuffledQuestions = shuffle([...quizData]);
        renderQuestions();
        startTimer();
    }

    // Render Form
    function renderQuestions() {
        const form = document.getElementById('quiz-form');
        form.innerHTML = '';

        shuffledQuestions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'q-text';
            qTitle.innerText = `प्र. ${index + 1}: ${q.q}`;
            card.appendChild(qTitle);

            const optsDiv = document.createElement('div');
            optsDiv.className = 'options';

            for (const [key, value] of Object.entries(q.opts)) {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${index}`;
                radio.value = key;
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(` ${value}`)); 
                optsDiv.appendChild(label);
            }
            card.appendChild(optsDiv);

            const feedback = document.createElement('div');
            feedback.id = `feedback-${index}`;
            feedback.className = 'feedback';
            card.appendChild(feedback);

            form.appendChild(card);
        });
    }

    // Timer Logic
    function startTimer() {
        const timerDisplay = document.getElementById('timer');
        timerInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            timerDisplay.innerText = `${minutes}:${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitQuiz();
            }
            timeLeft--;
        }, 1000);
    }

    // Submit and Evaluate
    function submitQuiz() {
        clearInterval(timerInterval);
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = "परीक्षा समाप्त (Test Submitted)";
        document.getElementById('submitBtn').style.opacity = "0.5";

        let score = 0;
        let candidateName = document.getElementById('candidateName').value;
        const total = shuffledQuestions.length;

        shuffledQuestions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback-${index}`);
            const card = feedbackDiv.parentElement;
            const options = card.querySelectorAll('label');

            let userAnswer = selected ? selected.value : null;

            const inputs = card.querySelectorAll('input');
            inputs.forEach(inp => inp.disabled = true);

            if (userAnswer === q.a) {
                score++;
                feedbackDiv.innerHTML = `✅ बिल्कुल सही उत्तर!`;
                feedbackDiv.className = 'feedback correct';
                if(selected) selected.parentElement.classList.add('actual-correct');
            } else {
                feedbackDiv.innerHTML = `❌ गलत उत्तर। सही विकल्प: <b>${q.opts[q.a]}</b>`;
                feedbackDiv.className = 'feedback wrong';
                
                if (selected) selected.parentElement.classList.add('user-wrong');
                
                options.forEach(lbl => {
                    if (lbl.querySelector('input').value === q.a) {
                        lbl.classList.add('actual-correct');
                    }
                });
            }
            feedbackDiv.style.display = 'block';
        });

        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('result-section').style.display = 'block';
        
        const container = document.querySelector('.container');
        const resSec = document.getElementById('result-section');
        const loginSec = document.getElementById('login-screen');
        container.insertBefore(resSec, loginSec.nextSibling);

        document.getElementById('final-score').innerText = `${score} / ${total}`;
        document.getElementById('candidate-display').innerText = `प्रतिभागी: ${candidateName}`;

        window.scrollTo({ top: 0, behavior: 'smooth' });

        downloadCSV(candidateName, score, total);
    }

    // Generate CSV for tracking
    function downloadCSV(name, score, total) {
        const date = new Date().toLocaleString('en-IN');
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
            + "Participant Name,Score,Total Questions,Topic,Date/Time\n"
            + `"${name}",${score},${total},"Indian Army History","${date}"`;

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Indian_Army_Quiz_${name.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Security Features to prevent cheating/copying
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // Disable F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Disable Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Disable Ctrl+Shift+J
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Disable Ctrl+U
    }
</script>
