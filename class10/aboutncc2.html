<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCC क्विज़ (सेट 2) - National Cadet Corps</title>
    <style>
        :root {
            --primary: #b91c1c; /* NCC Red */
            --secondary: #1e3a8a; /* NCC Navy Blue */
            --tertiary: #0ea5e9; /* NCC Air Force Blue */
            --bg: #f8fafc;
            --text: #0f172a;
            --white: #ffffff;
            --correct: #dcfce7;
            --correct-border: #16a34a;
            --wrong: #fee2e2;
            --wrong-border: #dc2626;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            /* Security: Disable text selection */
            user-select: none; 
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        /* Fixed Timer Bar */
        .timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: var(--secondary);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 3px solid var(--tertiary);
        }

        .container {
            max-width: 850px;
            margin: 90px auto 40px;
            background: var(--white);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-top: 5px solid var(--primary);
        }

        /* Login Screen */
        #login-screen {
            text-align: center;
            padding: 50px 20px;
        }

        h1 { color: var(--primary); margin-bottom: 10px; font-size: 2.2rem; text-transform: uppercase;}
        .subtitle { color: #64748b; margin-bottom: 30px; font-size: 1.15rem; font-weight: 500;}

        input[type="text"] {
            padding: 14px 20px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.15rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: background-color 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(185, 28, 28, 0.3);
        }
        .btn:hover { background-color: var(--secondary); }

        /* Quiz Section */
        #quiz-section { display: none; }

        .question-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-left: 5px solid var(--secondary);
            border-radius: 8px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .q-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 18px;
            color: #1e293b;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
            font-size: 1.05rem;
        }

        label:hover { background-color: #f1f5f9; border-color: #cbd5e1; }

        input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            accent-color: var(--primary);
        }

        /* Results */
        #result-section {
            display: none;
            text-align: center;
        }

        .score-box {
            background: var(--secondary);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px rgba(30, 58, 138, 0.3);
            border: 2px solid var(--tertiary);
        }
        .score-val { font-size: 4rem; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); color: #facc15; }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            text-align: left;
            font-size: 1.05rem;
        }
        .feedback.correct { background: var(--correct); color: #166534; border: 1px solid var(--correct-border); }
        .feedback.wrong { background: var(--wrong); color: #991b1b; border: 1px solid var(--wrong-border); }

        .user-wrong { background-color: var(--wrong) !important; border-color: var(--wrong-border) !important; }
        .actual-correct { background-color: var(--correct) !important; border-color: var(--correct-border) !important; font-weight: bold; }

    </style>
</head>
<body oncontextmenu="return false;">

    <div class="timer-bar">
        समय शेष: <span id="timer" style="margin-left: 15px; color: #facc15;">40:00</span>
    </div>

    <div class="container">
        
        <div id="login-screen">
            <h1>राष्ट्रीय कैडेट कोर (NCC) - सेट 2</h1>
            <p class="subtitle">ड्रिल, वेपन ट्रेनिंग और एनसीसी इतिहास (40 प्रश्न)</p>
            <input type="text" id="cadetName" placeholder="अपना नाम या रेजिमेंटल नंबर दर्ज करें" autocomplete="off">
            <br>
            <button class="btn" onclick="startQuiz()">परीक्षा शुरू करें (Start Quiz)</button>
        </div>

        <div id="quiz-section">
            <form id="quiz-form">
                </form>
            <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
                <button type="button" class="btn" id="submitBtn" onclick="submitQuiz()">उत्तर जमा करें (Submit Test)</button>
            </div>
        </div>

        <div id="result-section">
            <div class="score-box">
                <h2>आपका परीक्षा परिणाम</h2>
                <div class="score-val" id="final-score">0 / 40</div>
                <p id="cadet-display" style="font-size: 1.3rem; margin-top: 15px; opacity: 0.9;"></p>
                <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">विस्तृत विश्लेषण के लिए Result.csv डाउनलोड हो रहा है...</p>
            </div>
        </div>

    </div>

<script>
    // --- Data: 40 MCQs (NCC Set 2) ---
    // Exact Distribution: 10 A, 10 B, 10 C, 10 D.
    const quizData = [
        // Set A (Correct Answer: A) - 10 Questions
        { q: "NCC का झंडा पहली बार कब फहराया गया था?", a: "A", opts: { A: "1951", B: "1948", C: "1950", D: "1954" } },
        { q: "NCC के झंडे में हल्का नीला (Light Blue) रंग किस अंग को दर्शाता है?", a: "A", opts: { A: "वायु सेना (Air Force)", B: "थल सेना (Army)", C: "नौसेना (Navy)", D: "तटरक्षक (Coast Guard)" } },
        { q: "महानिदेशक (Director General) NCC का रैंक क्या होता है?", a: "A", opts: { A: "लेफ्टिनेंट जनरल", B: "मेजर जनरल", C: "ब्रिगेडियर", D: "कर्नल" } },
        { q: "ड्रिल के दौरान 'पीछे मुड़' (About Turn) के आदेश पर किस तरफ से मुड़ा जाता है?", a: "A", opts: { A: "दाहिनी तरफ से (Right Side)", B: "बाईं तरफ से", C: "सामने से", D: "किसी भी तरफ से" } },
        { q: "राइफल की सफाई के लिए 'पुल्थ्रू' (Pull-through) का उपयोग किस लिए किया जाता है?", a: "A", opts: { A: "बैरल (Barrel) की सफाई के लिए", B: "मैगजीन की सफाई के लिए", C: "ट्रिगर की सफाई के लिए", D: "बट की सफाई के लिए" } },
        { q: "मानचित्र (Map) पर भूरे (Brown) रंग की रेखाएं क्या दर्शाती हैं?", a: "A", opts: { A: "कंटूर (पहाड़ी/ऊंचाई)", B: "पानी (नदी/झील)", C: "वन (जंगल)", D: "सड़कें" } },
        { q: ".22 डीलक्स राइफल की कारगर रेंज (Effective Range) क्या है?", a: "A", opts: { A: "25 गज (Yards)", B: "50 गज", C: "100 गज", D: "200 गज" } },
        { q: "लीडरशिप में 'इंटेग्रिटी' (Integrity) का क्या अर्थ है?", a: "A", opts: { A: "ईमानदारी और नैतिकता", B: "अनुशासनहीनता", C: "साहस", D: "शारीरिक क्षमता" } },
        { q: "पूरे भारत में NCC के कितने निदेशालय (Directorates) हैं?", a: "A", opts: { A: "17", B: "15", C: "16", D: "18" } },
        { q: "7.62 mm SLR की मैगजीन में अधिकतम कितने राउंड आते हैं?", a: "A", opts: { A: "20 राउंड", B: "30 राउंड", C: "10 राउंड", D: "15 राउंड" } },

        // Set B (Correct Answer: B) - 10 Questions
        { q: "NCC गान 'हम सब भारतीय हैं' के रचयिता कौन हैं?", a: "B", opts: { A: "रवींद्रनाथ टैगोर", B: "सुदर्शन फाकिर", C: "बंकिम चंद्र चटर्जी", D: "रामप्रसाद बिस्मिल" } },
        { q: "'सावधान' की स्थिति में दोनों पंजों के बीच कितने डिग्री का कोण होता है?", a: "B", opts: { A: "45 डिग्री", B: "30 डिग्री", C: "60 डिग्री", D: "90 डिग्री" } },
        { q: "5.56 mm INSAS राइफल का कारगर रेंज (Effective Range) कितना है?", a: "B", opts: { A: "200 मीटर", B: "400 मीटर", C: "300 मीटर", D: "500 मीटर" } },
        { q: "राष्ट्रीय एकीकरण शिविर (NIC) का मुख्य उद्देश्य क्या है?", a: "B", opts: { A: "हथियार चलाना सिखाना", B: "विभिन्न संस्कृतियों और राज्यों के कैडेट्स में एकता बढ़ाना", C: "विदेश भेजना", D: "केवल खेलकूद प्रतियोगिताएं" } },
        { q: "प्रिज्मीय कंपास (Prismatic Compass) का मुख्य उपयोग क्या है?", a: "B", opts: { A: "दूरी मापना", B: "डिग्री (Bearing) मापना और दिशा खोजना", C: "ऊंचाई मापना", D: "हवा की गति मापना" } },
        { q: "गार्ड ऑफ ऑनर (Guard of Honour) में भारत के प्रधानमंत्री के लिए कितने कैडेट्स की नफरी होती है?", a: "B", opts: { A: "150", B: "100", C: "50", D: "200" } },
        { q: "'विश्राम' अवस्था में दोनों एड़ियों (Heels) के बीच कितनी दूरी होती है?", a: "B", opts: { A: "10 इंच", B: "12 इंच", C: "18 इंच", D: "8 इंच" } },
        { q: "'C' सर्टिफिकेट परीक्षा के लिए 'B' सर्टिफिकेट पास करने के बाद कम से कम कितना समय अनिवार्य है?", a: "B", opts: { A: "6 महीने", B: "1 वर्ष", C: "2 वर्ष", D: "कोई समय सीमा नहीं" } },
        { q: "आग बुझाने के मुख्य तीन तत्व (Fire Triangle) क्या हैं?", a: "B", opts: { A: "हवा, पानी, मिट्टी", B: "ईंधन, ऑक्सीजन, तापमान (Heat)", C: "लकड़ी, गैस, पानी", D: "रसायन, कार्बन, हवा" } },
        { q: "'तेज चल' में एक मिनट में कितने कदम लिए जाते हैं (SD/SW कैडेट्स के लिए सामान्यतः)?", a: "B", opts: { A: "110", B: "120", C: "130", D: "100" } },

        // Set C (Correct Answer: C) - 10 Questions
        { q: "NCC के ध्वज में लाल (Red) रंग क्या दर्शाता है?", a: "C", opts: { A: "नौसेना", B: "वायु सेना", C: "थल सेना (Army)", D: "रक्त" } },
        { q: "ड्रिल (Drill) की शुरुआत किस देश से मानी जाती है?", a: "C", opts: { A: "भारत", B: "ब्रिटेन", C: "जर्मनी (जनरल ड्राल द्वारा)", D: "अमेरिका" } },
        { q: "LMG (Light Machine Gun) को साफ करने के लिए मुख्य रूप से कितने भागों में खोला जाता है?", a: "C", opts: { A: "3", B: "4", C: "5", D: "6" } },
        { q: "मैप रीडिंग में उत्तर (North) दिशा कितने प्रकार की होती है?", a: "C", opts: { A: "1", B: "2", C: "3 (True, Magnetic, Grid North)", D: "4" } },
        { q: "प्राथमिक उपचार (First Aid) का मुख्य उद्देश्य क्या है?", a: "C", opts: { A: "डॉक्टर बनना", B: "बीमारी बढ़ाना", C: "जीवन बचाना और स्थिति को बिगड़ने से रोकना", D: "अस्पताल से भागना" } },
        { q: "बिना हथियार के 'सैल्यूट' (Salute) कितने प्रकार के होते हैं?", a: "C", opts: { A: "1", B: "2", C: "3 (सामने का, दाहिने का, बाएं का)", D: "4" } },
        { q: "भारत का सर्वोच्च सैन्य वीरता पुरस्कार (युद्धकाल) कौन सा है?", a: "C", opts: { A: "अशोक चक्र", B: "महावीर चक्र", C: "परमवीर चक्र", D: "शौर्य चक्र" } },
        { q: ".22 राइफल (मार्क IV) का वजन लगभग कितना होता है?", a: "C", opts: { A: "5 पौंड 4 औंस", B: "6 पौंड", C: "8 पौंड 10 औंस", D: "9 पौंड" } },
        { q: "एनसीसी में 'कैंप' (Camp) ट्रेनिंग का सबसे महत्वपूर्ण पहलू क्या है?", a: "C", opts: { A: "आराम करना", B: "घर से दूर रहना", C: "टीम वर्क, नेतृत्व और अनुशासन का विकास करना", D: "केवल शारीरिक व्यायाम करना" } },
        { q: "समाज सेवा (Social Service) के अंतर्गत NCC कैडेट्स मुख्य रूप से क्या करते हैं?", a: "C", opts: { A: "चुनाव लड़ना", B: "व्यापार करना", C: "रक्तदान, वृक्षारोपण और पल्स पोलियो अभियान", D: "पुलिस की ड्यूटी करना" } },

        // Set D (Correct Answer: D) - 10 Questions
        { q: "NCC में YEP का पूर्ण रूप क्या है?", a: "D", opts: { A: "Youth Education Program", B: "Young Energetic Person", C: "Youth Empowerment Program", D: "Youth Exchange Program" } },
        { q: "भारत के प्रथम फील्ड मार्शल (Field Marshal) कौन थे?", a: "D", opts: { A: "के. एम. करियप्पा", B: "अर्जन सिंह", C: "वी. के. सिंह", D: "सैम मानेकशॉ" } },
        { q: "ड्रिल में 'वर्ड ऑफ कमांड' (Word of Command) के कितने भाग होते हैं?", a: "D", opts: { A: "4", B: "3", C: "1", D: "2 (चेतावनी और कार्यकारी)" } },
        { q: "राइफल से सही निशाना (Good Shooting) लगाने के बुनियादी उसूल क्या हैं?", a: "D", opts: { A: "केवल अच्छी दृष्टि", B: "केवल राइफल का वजन", C: "अच्छी ट्रिगर वर्किंग", D: "मजबूत पकड़, सही लक्ष्य और सही ट्रिगर ऑपरेशन (HAT)" } },
        { q: "दिन के समय दिशा (Direction) ज्ञात करने का सबसे अच्छा प्राकृतिक तरीका कौन सा है?", a: "D", opts: { A: "चांद से", B: "तारों से", C: "बादलों से", D: "सूर्य (Sun) से" } },
        { q: "ड्रिल में 'लाइन तोड़' (Falling Out) का क्या अर्थ होता है?", a: "D", opts: { A: "परेड की पूरी समाप्ति", B: "सजा मिलना", C: "घर जाना", D: "थोड़े समय का विश्राम (Break)" } },
        { q: "7.62 mm SLR की कारगर रेंज (Effective Range) क्या है?", a: "D", opts: { A: "100 मीटर", B: "200 गज", C: "500 गज", D: "300 गज" } },
        { q: "भारतीय वायु सेना (Air Force) का सर्वोच्च रैंक क्या होता है?", a: "D", opts: { A: "एडमिरल", B: "जनरल", C: "ग्रुप कैप्टन", D: "एयर चीफ मार्शल" } },
        { q: "भारत में एनसीसी की स्थापना किस समिति की सिफारिश पर की गई थी?", a: "D", opts: { A: "कोठारी समिति", B: "स्वर्ण सिंह समिति", C: "सरकारी समिति", D: "पं. एच.एन. कुंजरू समिति" } },
        { q: "एक अच्छे नागरिक (Good Citizen) का मुख्य कर्तव्य क्या है?", a: "D", opts: { A: "कर चोरी करना", B: "नियमों को तोड़ना", C: "दूसरों को परेशान करना", D: "देश के कानूनों का पालन करना और संविधान के प्रति वफादार होना" } }
    ];

    // Array Shuffler
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let shuffledQuestions = [];
    let timeLeft = 40 * 60; // 40 Minutes
    let timerInterval;

    // Start Quiz
    function startQuiz() {
        const nameInput = document.getElementById('cadetName');
        if (!nameInput.value.trim()) {
            alert("क्विज़ शुरू करने से पहले कृपया अपना नाम या रेजिमेंटल नंबर दर्ज करें।");
            return;
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        
        shuffledQuestions = shuffle([...quizData]);
        renderQuestions();
        startTimer();
    }

    // Render Questions
    function renderQuestions() {
        const form = document.getElementById('quiz-form');
        form.innerHTML = '';

        shuffledQuestions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'q-text';
            qTitle.innerText = `प्र. ${index + 1}: ${q.q}`;
            card.appendChild(qTitle);

            const optsDiv = document.createElement('div');
            optsDiv.className = 'options';

            for (const [key, value] of Object.entries(q.opts)) {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${index}`;
                radio.value = key;
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(` ${value}`)); 
                optsDiv.appendChild(label);
            }
            card.appendChild(optsDiv);

            const feedback = document.createElement('div');
            feedback.id = `feedback-${index}`;
            feedback.className = 'feedback';
            card.appendChild(feedback);

            form.appendChild(card);
        });
    }

    // Timer Logic
    function startTimer() {
        const timerDisplay = document.getElementById('timer');
        timerInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            timerDisplay.innerText = `${minutes}:${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitQuiz();
            }
            timeLeft--;
        }, 1000);
    }

    // Submit and Evaluate
    function submitQuiz() {
        clearInterval(timerInterval);
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = "परीक्षा समाप्त (Test Submitted)";
        document.getElementById('submitBtn').style.opacity = "0.5";

        let score = 0;
        let cadetName = document.getElementById('cadetName').value;
        const total = shuffledQuestions.length;

        shuffledQuestions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback-${index}`);
            const card = feedbackDiv.parentElement;
            const options = card.querySelectorAll('label');

            let userAnswer = selected ? selected.value : null;

            // Lock inputs
            const inputs = card.querySelectorAll('input');
            inputs.forEach(inp => inp.disabled = true);

            if (userAnswer === q.a) {
                score++;
                feedbackDiv.innerHTML = `✅ बिल्कुल सही उत्तर!`;
                feedbackDiv.className = 'feedback correct';
                if(selected) selected.parentElement.classList.add('actual-correct');
            } else {
                feedbackDiv.innerHTML = `❌ गलत उत्तर। सही विकल्प: <b>${q.opts[q.a]}</b>`;
                feedbackDiv.className = 'feedback wrong';
                
                if (selected) selected.parentElement.classList.add('user-wrong');
                
                options.forEach(lbl => {
                    if (lbl.querySelector('input').value === q.a) {
                        lbl.classList.add('actual-correct');
                    }
                });
            }
            feedbackDiv.style.display = 'block';
        });

        // Show Result Screen
        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('result-section').style.display = 'block';
        
        const container = document.querySelector('.container');
        const resSec = document.getElementById('result-section');
        const loginSec = document.getElementById('login-screen');
        container.insertBefore(resSec, loginSec.nextSibling);

        document.getElementById('final-score').innerText = `${score} / ${total}`;
        document.getElementById('cadet-display').innerText = `कैडेट: ${cadetName}`;

        window.scrollTo({ top: 0, behavior: 'smooth' });

        downloadCSV(cadetName, score, total);
    }

    // Generate CSV Results File
    function downloadCSV(name, score, total) {
        const date = new Date().toLocaleString('en-IN');
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
            + "Cadet Name/Reg. No.,Score,Total Questions,Topic,Date\n"
            + `"${name}",${score},${total},"NCC Quiz - Set 2","${date}"`;

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `NCC_Set2_${name.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Security Features
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // Disable F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
    }
</script>
