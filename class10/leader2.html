<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नेतृत्व और व्यक्तित्व विकास (Set 2) - Leadership & Personality Building</title>
    <style>
        :root {
            --primary: #0f766e; /* Teal 600 */
            --secondary: #115e59; /* Teal 700 */
            --bg: #f0fdfa; /* Teal 50 */
            --text: #0f172a; /* Slate 900 */
            --white: #ffffff;
            --correct: #dcfce7;
            --correct-border: #16a34a;
            --wrong: #fee2e2;
            --wrong-border: #dc2626;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            /* Disable text selection for security */
            user-select: none; 
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        /* Fixed Timer Bar */
        .timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        .container {
            max-width: 850px;
            margin: 90px auto 40px;
            background: var(--white);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(15, 118, 110, 0.15);
        }

        /* Login Screen */
        #login-screen {
            text-align: center;
            padding: 50px 20px;
        }

        h1 { color: var(--primary); margin-bottom: 10px; font-size: 2.2rem;}
        .subtitle { color: #475569; margin-bottom: 30px; font-size: 1.15rem; font-weight: 500;}

        input[type="text"] {
            padding: 14px 20px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.15rem;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            transition: background-color 0.2s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(15, 118, 110, 0.3);
        }
        .btn:hover { background-color: var(--secondary); }

        /* Quiz Section */
        #quiz-section { display: none; }

        .question-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-left: 5px solid var(--primary);
            border-radius: 8px;
            padding: 20px 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .q-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 18px;
            color: #1e293b;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        label {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
            font-size: 1.05rem;
        }

        label:hover { background-color: #f1f5f9; border-color: #94a3b8; }

        input[type="radio"] {
            margin-right: 15px;
            transform: scale(1.3);
            accent-color: var(--primary);
        }

        /* Results */
        #result-section {
            display: none;
            text-align: center;
        }

        .score-box {
            background: var(--primary);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px rgba(15, 118, 110, 0.2);
        }
        .score-val { font-size: 4rem; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); color: #ccfbf1; }

        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            text-align: left;
            font-size: 1.05rem;
        }
        .feedback.correct { background: var(--correct); color: #166534; border: 1px solid var(--correct-border); }
        .feedback.wrong { background: var(--wrong); color: #991b1b; border: 1px solid var(--wrong-border); }

        .user-wrong { background-color: var(--wrong) !important; border-color: var(--wrong-border) !important; }
        .actual-correct { background-color: var(--correct) !important; border-color: var(--correct-border) !important; font-weight: bold; }

    </style>
</head>
<body oncontextmenu="return false;"> <div class="timer-bar">
        समय शेष: <span id="timer" style="margin-left: 15px; color: #5eead4;">40:00</span>
    </div>

    <div class="container">
        
        <div id="login-screen">
            <h1>नेतृत्व और व्यक्तित्व विकास - सेट 2</h1>
            <p class="subtitle">Leadership & Personality Building (40 Questions)</p>
            <input type="text" id="candidateName" placeholder="अपना पूरा नाम दर्ज करें" autocomplete="off">
            <br>
            <button class="btn" onclick="startQuiz()">मूल्यांकन शुरू करें (Start Quiz)</button>
        </div>

        <div id="quiz-section">
            <form id="quiz-form">
                </form>
            <div style="text-align: center; margin-top: 40px; margin-bottom: 20px;">
                <button type="button" class="btn" id="submitBtn" onclick="submitQuiz()">उत्तर जमा करें (Submit Test)</button>
            </div>
        </div>

        <div id="result-section">
            <div class="score-box">
                <h2>आपका मूल्यांकन परिणाम</h2>
                <div class="score-val" id="final-score">0 / 40</div>
                <p id="candidate-display" style="font-size: 1.3rem; margin-top: 15px; opacity: 0.9;"></p>
                <p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">विस्तृत विश्लेषण के लिए Result.csv डाउनलोड हो रहा है...</p>
            </div>
        </div>

    </div>

<script>
    // --- Data: 40 MCQs (Leadership & Personality Building Set 2) ---
    // Distribution: Exactly 10 A, 10 B, 10 C, 10 D.
    const quizData = [
        // Set A (Correct Answer: A) - 10 Questions
        { q: "एक सच्चे लीडर का सबसे महत्वपूर्ण गुण क्या है?", a: "A", opts: { A: "ईमानदारी और सत्यनिष्ठा", B: "तानाशाही", C: "स्वार्थ", D: "टालमटोल" } },
        { q: "टीम निर्माण (Team Building) में 'सहयोग' का क्या महत्व है?", a: "A", opts: { A: "यह टीम के सदस्यों को एकजुट करता है", B: "यह प्रतिस्पर्धा बढ़ाता है", C: "यह संघर्ष को जन्म देता है", D: "यह काम को धीमा करता है" } },
        { q: "आत्म-विश्वास (Self-confidence) कैसे बढ़ाया जा सकता है?", a: "A", opts: { A: "अपनी छोटी सफलताओं का जश्न मनाकर", B: "दूसरों से तुलना करके", C: "हमेशा गलतियों पर ध्यान देकर", D: "कोई नया काम न करके" } },
        { q: "प्रभावी संचार (Effective Communication) का पहला कदम क्या है?", a: "A", opts: { A: "सक्रिय रूप से सुनना (Active Listening)", B: "बिना सोचे बोलना", C: "दूसरों को बीच में टोकना", D: "सिर्फ अपनी बात मनवाना" } },
        { q: "'बर्नआउट' (Burnout) से बचने के लिए एक लीडर को क्या करना चाहिए?", a: "A", opts: { A: "कार्य-जीवन संतुलन (Work-life balance) बनाए रखना", B: "लगातार काम करना", C: "छुट्टियां रद्द करना", D: "दूसरों का काम भी खुद करना" } },
        { q: "एक प्रभावशाली व्यक्तित्व (Impressive Personality) की पहचान क्या है?", a: "A", opts: { A: "सकारात्मक दृष्टिकोण (Positive Attitude)", B: "महंगी घड़ी पहनना", C: "हमेशा गंभीर रहना", D: "दूसरों की निंदा करना" } },
        { q: "संघर्ष प्रबंधन (Conflict Management) में 'समझौता' (Compromise) का क्या अर्थ है?", a: "A", opts: { A: "दोनों पक्षों द्वारा थोड़ा-थोड़ा झुकना", B: "एक पक्ष की पूरी हार", C: "विवाद को अनदेखा करना", D: "लड़ाई को और बढ़ाना" } },
        { q: "'सहानुभूति' (Empathy) का क्या अर्थ है?", a: "A", opts: { A: "दूसरों की भावनाओं को समझना और महसूस करना", B: "दूसरों पर दया दिखाना", C: "दूसरों का मजाक उड़ाना", D: "केवल अपने बारे में सोचना" } },
        { q: "नेटवर्किंग (Networking) एक पेशेवर के लिए क्यों महत्वपूर्ण है?", a: "A", opts: { A: "यह नए अवसरों और संबंधों का निर्माण करता है", B: "यह केवल समय की बर्बादी है", C: "इससे पैसे कमाने का शॉर्टकट मिलता है", D: "यह केवल इंट्रोवर्ट्स के लिए है" } },
        { q: "'डेलिगेशन' (Delegation) का सही तरीका क्या है?", a: "A", opts: { A: "सही व्यक्ति को सही काम और अधिकार सौंपना", B: "काम सौंपकर भूल जाना", C: "काम सौंपने के बाद भी खुद ही करना", D: "किसी को कोई जिम्मेदारी न देना" } },

        // Set B (Correct Answer: B) - 10 Questions
        { q: "नेतृत्व में 'दृष्टिकोण' (Vision) का क्या अर्थ है?", a: "B", opts: { A: "केवल आज के बारे में सोचना", B: "भविष्य का स्पष्ट लक्ष्य और दिशा तय करना", C: "पुरानी गलतियों को दोहराना", D: "दिन में सपने देखना" } },
        { q: "'टाइम मैनेजमेंट' (Time Management) का सबसे अच्छा तरीका कौन सा है?", a: "B", opts: { A: "सभी काम एक साथ करना", B: "कार्यों को उनकी प्राथमिकता के अनुसार बांटना", C: "काम को कल पर टालना", D: "बिना योजना के काम शुरू करना" } },
        { q: "रचनात्मक आलोचना (Constructive Criticism) का मुख्य उद्देश्य क्या है?", a: "B", opts: { A: "व्यक्ति को नीचा दिखाना", B: "व्यक्ति के सुधार और विकास में मदद करना", C: "अपनी श्रेष्ठता साबित करना", D: "विवाद पैदा करना" } },
        { q: "'इमोशनल इंटेलिजेंस' (Emotional Intelligence) में क्या शामिल है?", a: "B", opts: { A: "केवल गणितीय गणनाएँ", B: "अपनी और दूसरों की भावनाओं को समझना व प्रबंधित करना", C: "अपनी भावनाओं को दबाना", D: "हर समय भावुक रहना" } },
        { q: "एक अच्छा 'मेंटर' (Mentor) क्या करता है?", a: "B", opts: { A: "आपका सारा काम खुद करता है", B: "आपको सही मार्गदर्शन और अनुभव प्रदान करता है", C: "आपको हमेशा डांटता है", D: "आपसे पैसे उधार लेता है" } },
        { q: "लक्ष्य निर्धारण (Goal Setting) में 'S.M.A.R.T.' में 'M' का क्या अर्थ है?", a: "B", opts: { A: "Magical", B: "Measurable (मापने योग्य)", C: "Meaningless", D: "Maximum" } },
        { q: "'स्ट्रेस मैनेजमेंट' (Stress Management) के लिए क्या हानिकारक है?", a: "B", opts: { A: "ध्यान और योग", B: "अत्यधिक कैफीन और नींद की कमी", C: "संगीत सुनना", D: "परिवार के साथ समय बिताना" } },
        { q: "एक लीडर को 'असफलता' (Failure) को कैसे लेना चाहिए?", a: "B", opts: { A: "हार मानकर बैठ जाना चाहिए", B: "सीखने के अवसर (Learning Opportunity) के रूप में", C: "दूसरों पर दोष मढ़ना चाहिए", D: "सफलता का जश्न मनाना चाहिए" } },
        { q: "'बॉडी लैंग्वेज' (Body Language) संचार का कौन सा हिस्सा है?", a: "B", opts: { A: "शाब्दिक (Verbal)", B: "अशाब्दिक (Non-verbal)", C: "लिखित (Written)", D: "श्रव्य (Audio)" } },
        { q: "निर्णय लेने (Decision Making) की प्रक्रिया में सबसे महत्वपूर्ण क्या है?", a: "B", opts: { A: "बिना सोचे फैसला करना", B: "सभी विकल्पों का विश्लेषण करना", C: "दूसरों से पूछकर उनकी बात मान लेना", D: "सिक्के को उछालकर फैसला करना" } },

        // Set C (Correct Answer: C) - 10 Questions
        { q: "टीम के मनोबल (Morale) को बढ़ाने का सबसे अच्छा तरीका क्या है?", a: "C", opts: { A: "उन्हें डराकर रखना", B: "उनकी गलतियों पर सजा देना", C: "उनके अच्छे काम की सराहना करना और उन्हें प्रोत्साहित करना", D: "उन्हें कोई काम न देना" } },
        { q: "'करिश्माई नेतृत्व' (Charismatic Leadership) किस पर आधारित होता है?", a: "C", opts: { A: "पद के डर पर", B: "कड़े नियमों पर", C: "लीडर के व्यक्तिगत आकर्षण और प्रेरणा देने की क्षमता पर", D: "रिश्वत देने पर" } },
        { q: "एक 'एक्टिव लिसनर' (Active Listener) क्या करता है?", a: "C", opts: { A: "बोलते समय मोबाइल चलाता है", B: "बीच-बीच में टोकता है", C: "वक्ता की बात को ध्यान से सुनता है और फीडबैक देता है", D: "केवल अपने बारे में सोचता है" } },
        { q: "'ग्रोथ माइंडसेट' (Growth Mindset) वाले व्यक्ति की क्या पहचान है?", a: "C", opts: { A: "वह नई चीजें सीखने से डरता है", B: "वह मानता है कि बुद्धि जन्मजात होती है", C: "वह चुनौतियों को स्वीकार करता है और मेहनत से अपनी क्षमता बढ़ाता है", D: "वह जल्दी हार मान लेता है" } },
        { q: "पब्लिक स्पीकिंग (Public Speaking) का डर कैसे दूर किया जा सकता है?", a: "C", opts: { A: "मंच से भाग कर", B: "बिना तैयारी के बोलकर", C: "विषय की अच्छी तैयारी और बार-बार अभ्यास करके", D: "श्रोताओं से लड़कर" } },
        { q: "'सॉफ्ट स्किल्स' (Soft Skills) में क्या शामिल नहीं है?", a: "C", opts: { A: "संचार (Communication)", B: "टीम वर्क (Teamwork)", C: "कोडिंग (Coding)", D: "समय प्रबंधन (Time Management)" } },
        { q: "एक 'ट्रांसफॉर्मेशनल लीडर' (Transformational Leader) का क्या काम है?", a: "C", opts: { A: "पुरानी प्रथाओं को बनाए रखना", B: "केवल मुनाफे पर ध्यान देना", C: "अनुयायियों को प्रेरित करके सकारात्मक बदलाव लाना", D: "काम में बाधा डालना" } },
        { q: "'समस्या समाधान' (Problem Solving) में पहला कदम क्या है?", a: "C", opts: { A: "समाधान खोजना", B: "दूसरों को दोष देना", C: "समस्या की सही पहचान करना", D: "समस्या को अनदेखा करना" } },
        { q: "'प्रोएक्टिव' (Proactive) होने का क्या मतलब है?", a: "C", opts: { A: "घटना होने के बाद प्रतिक्रिया देना", B: "कुछ न करना", C: "भविष्य की चुनौतियों का अनुमान लगाकर पहले से तैयारी करना", D: "दूसरों के काम में दखल देना" } },
        { q: "एक पेशेवर सेटिंग में 'ड्रेस कोड' (Dress Code) का क्या महत्व है?", a: "C", opts: { A: "यह आपको अमीर दिखाता है", B: "यह कोई मायने नहीं रखता", C: "यह आपके पेशेवर रवैये और कंपनी की संस्कृति को दर्शाता है", D: "यह केवल फैशन के लिए है" } },

        // Set D (Correct Answer: D) - 10 Questions
        { q: "'माइक्रो-मैनेजमेंट' (Micro-management) का क्या प्रभाव होता है?", a: "D", opts: { A: "काम जल्दी होता है", B: "कर्मचारी खुश रहते हैं", C: "टीम का विश्वास बढ़ता है", D: "कर्मचारियों का मनोबल और उत्पादकता गिरती है" } },
        { q: "एक सफल 'नेगोशिएशन' (मोलभाव) का लक्ष्य क्या होना चाहिए?", a: "D", opts: { A: "सामने वाले को पूरी तरह हराना", B: "बीच में ही बातचीत छोड़ देना", C: "केवल अपना फायदा देखना", D: "'विन-विन' (Win-Win) स्थिति प्राप्त करना जहाँ दोनों पक्षों को लाभ हो" } },
        { q: "'वर्क एथिक्स' (Work Ethics) का क्या तात्पर्य है?", a: "D", opts: { A: "काम से चोरी करना", B: "ऑफिस में गपशप करना", C: "हमेशा देर से आना", D: "कार्यस्थल पर ईमानदारी, जिम्मेदारी और पेशेवर नियम अपनाना" } },
        { q: "'अडैप्टेबिलिटी' (Adaptability) का गुण क्यों आवश्यक है?", a: "D", opts: { A: "ताकि हम एक ही जगह रुके रहें", B: "पुरानी आदतों को बनाए रखने के लिए", C: "दूसरों को बदलने के लिए", D: "बदलते परिवेश और नई परिस्थितियों में खुद को ढालने के लिए" } },
        { q: "'अहस्तक्षेपी नेतृत्व' (Laissez-Faire Leadership) में क्या होता है?", a: "D", opts: { A: "लीडर हर काम खुद करता है", B: "लीडर कड़े नियम बनाता है", C: "लीडर टीम को डराता है", D: "लीडर टीम को अपना काम करने की पूरी आज़ादी देता है" } },
        { q: "'इम्पोस्टर सिंड्रोम' (Imposter Syndrome) क्या है?", a: "D", opts: { A: "बहुत ज्यादा आत्मविश्वास होना", B: "एक प्रकार का बुखार", C: "दूसरों की नकल करने की बीमारी", D: "अपनी ही योग्यताओं पर शक करना और खुद को धोखेबाज़ समझना" } },
        { q: "फीडबैक (Feedback) स्वीकार करते समय एक अच्छे पेशेवर को क्या करना चाहिए?", a: "D", opts: { A: "गुस्सा करना चाहिए", B: "फीडबैक देने वाले से झगड़ा करना चाहिए", C: "फीडबैक को अनसुना कर देना चाहिए", D: "उसे खुले दिमाग से सुनना और सुधार के लिए उपयोग करना चाहिए" } },
        { q: "'रेजिलिएंस' (Resilience) का क्या मतलब है?", a: "D", opts: { A: "हार मान लेना", B: "कठोर व्यवहार करना", C: "हमेशा शिकायत करना", D: "मुश्किलों और असफलताओं के बाद फिर से मजबूती से खड़े होना" } },
        { q: "'पर्सनल ब्रांडिंग' (Personal Branding) से क्या लाभ होता है?", a: "D", opts: { A: "यह आपको घमंडी बनाता है", B: "इससे आपका काम बढ़ जाता है", C: "यह केवल अभिनेताओं के लिए है", D: "यह आपके पेशेवर नेटवर्क और करियर के अवसरों को बढ़ाता है" } },
        { q: "एक टीम मीटिंग (Team Meeting) को सफल बनाने के लिए क्या जरूरी है?", a: "D", opts: { A: "बिना एजेंडा के मीटिंग करना", B: "किसी एक व्यक्ति को ही बोलने देना", C: "मीटिंग को घंटों तक खींचना", D: "एक स्पष्ट एजेंडा होना और समय का पालन करना" } }
    ];

    // Function to shuffle questions
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    let shuffledQuestions = [];
    let timeLeft = 40 * 60; // 40 Minutes
    let timerInterval;

    // Start Quiz
    function startQuiz() {
        const nameInput = document.getElementById('candidateName');
        if (!nameInput.value.trim()) {
            alert("क्विज़ शुरू करने से पहले कृपया अपना नाम दर्ज करें।");
            return;
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        
        shuffledQuestions = shuffle([...quizData]);
        renderQuestions();
        startTimer();
    }

    // Render Form
    function renderQuestions() {
        const form = document.getElementById('quiz-form');
        form.innerHTML = '';

        shuffledQuestions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'q-text';
            qTitle.innerText = `प्र. ${index + 1}: ${q.q}`;
            card.appendChild(qTitle);

            const optsDiv = document.createElement('div');
            optsDiv.className = 'options';

            for (const [key, value] of Object.entries(q.opts)) {
                const label = document.createElement('label');
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${index}`;
                radio.value = key;
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(` ${value}`)); 
                optsDiv.appendChild(label);
            }
            card.appendChild(optsDiv);

            const feedback = document.createElement('div');
            feedback.id = `feedback-${index}`;
            feedback.className = 'feedback';
            card.appendChild(feedback);

            form.appendChild(card);
        });
    }

    // Timer Logic
    function startTimer() {
        const timerDisplay = document.getElementById('timer');
        timerInterval = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            timerDisplay.innerText = `${minutes}:${seconds}`;

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                submitQuiz();
            }
            timeLeft--;
        }, 1000);
    }

    // Submit and Evaluate
    function submitQuiz() {
        clearInterval(timerInterval);
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = "मूल्यांकन समाप्त (Test Submitted)";
        document.getElementById('submitBtn').style.opacity = "0.5";

        let score = 0;
        let candidateName = document.getElementById('candidateName').value;
        const total = shuffledQuestions.length;

        shuffledQuestions.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback-${index}`);
            const card = feedbackDiv.parentElement;
            const options = card.querySelectorAll('label');

            let userAnswer = selected ? selected.value : null;

            const inputs = card.querySelectorAll('input');
            inputs.forEach(inp => inp.disabled = true);

            if (userAnswer === q.a) {
                score++;
                feedbackDiv.innerHTML = `✅ बिल्कुल सही उत्तर!`;
                feedbackDiv.className = 'feedback correct';
                if(selected) selected.parentElement.classList.add('actual-correct');
            } else {
                feedbackDiv.innerHTML = `❌ गलत उत्तर। सही विकल्प: <b>${q.opts[q.a]}</b>`;
                feedbackDiv.className = 'feedback wrong';
                
                if (selected) selected.parentElement.classList.add('user-wrong');
                
                options.forEach(lbl => {
                    if (lbl.querySelector('input').value === q.a) {
                        lbl.classList.add('actual-correct');
                    }
                });
            }
            feedbackDiv.style.display = 'block';
        });

        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('result-section').style.display = 'block';
        
        const container = document.querySelector('.container');
        const resSec = document.getElementById('result-section');
        const loginSec = document.getElementById('login-screen');
        container.insertBefore(resSec, loginSec.nextSibling);

        document.getElementById('final-score').innerText = `${score} / ${total}`;
        document.getElementById('candidate-display').innerText = `प्रतिभागी: ${candidateName}`;

        window.scrollTo({ top: 0, behavior: 'smooth' });

        downloadCSV(candidateName, score, total);
    }

    // Generate CSV for tracking
    function downloadCSV(name, score, total) {
        const date = new Date().toLocaleString('en-IN');
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
            + "Participant Name,Score,Total Questions,Topic,Date/Time\n"
            + `"${name}",${score},${total},"Leadership & Personality Building - Set 2","${date}"`;

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `Leadership_Set2_Result_${name.replace(/\s+/g, '_')}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Security Features to prevent cheating/copying
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; // Disable F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Disable Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Disable Ctrl+Shift+J
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Disable Ctrl+U
    }
</script>
